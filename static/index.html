<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch — Movie Recommender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0b0f;
    --bg-raised: #15151b;
    --bg-card: #1c1c23;
    --gold: #e8b24d;
    --gold-dim: #a9812f;
    --crimson: #8b1e3f;
    --cream: #f2efe9;
    --muted: #9a97a3;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  h1, h2, h3, .display {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.04em;
    font-weight: 400;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 18px 40px;
    background: linear-gradient(to bottom, rgba(11,11,15,0.97), rgba(11,11,15,0.85));
    backdrop-filter: blur(6px);
    border-bottom: 1px solid rgba(232,178,77,0.15);
  }

  .logo {
    font-size: 28px;
    color: var(--gold);
    white-space: nowrap;
  }
  .logo span { color: var(--cream); }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 520px;
  }

  #searchInput {
    width: 100%;
    padding: 11px 16px;
    border-radius: 999px;
    border: 1px solid rgba(232,178,77,0.3);
    background: var(--bg-raised);
    color: var(--cream);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(232,178,77,0.15);
  }

  #suggestions {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: var(--bg-raised);
    border: 1px solid rgba(232,178,77,0.2);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 340px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  #suggestions.show { display: block; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .suggestion-item:hover { background: rgba(232,178,77,0.08); }
  .suggestion-item img {
    width: 32px;
    height: 46px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: #000;
  }
  .suggestion-item .s-title { font-size: 14px; }
  .suggestion-item .s-year { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ---------- Category tabs ---------- */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 40px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 8px 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--cream); border-color: rgba(232,178,77,0.3); }
  .tab.active {
    background: var(--gold);
    color: #1a1204;
    border-color: var(--gold);
  }

  /* ---------- Rows ---------- */
  main { padding: 8px 0 60px; }

  .row-section { margin-top: 34px; }
  .row-title {
    font-size: 26px;
    color: var(--cream);
    padding: 0 40px;
    margin-bottom: 14px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .row-title .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 700;
  }

  .poster-row {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding: 4px 40px 16px;
    scroll-behavior: smooth;
  }
  .poster-row::-webkit-scrollbar { height: 8px; }
  .poster-row::-webkit-scrollbar-thumb { background: rgba(232,178,77,0.25); border-radius: 4px; }
  .poster-row::-webkit-scrollbar-track { background: transparent; }

  .poster-card {
    flex: 0 0 auto;
    width: 150px;
    cursor: pointer;
    transition: transform 0.25s ease;
  }
  .poster-card:hover { transform: translateY(-6px); }

  .poster-img-wrap {
    width: 150px;
    height: 220px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
  }
  .poster-card:hover .poster-img-wrap {
    box-shadow: 0 0 0 2px var(--gold), 0 16px 32px rgba(0,0,0,0.5);
  }
  .poster-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .poster-img-wrap .no-img {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 10px;
  }

  .poster-meta {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.3;
  }
  .poster-meta .p-title {
    color: var(--cream);
    font-weight: 600;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .poster-meta .p-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  .score-badge {
    color: var(--gold);
    font-weight: 700;
  }

  .loading-row, .empty-row {
    padding: 20px 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ---------- Detail overlay ---------- */
  #detailOverlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,7,0.92);
    z-index: 100;
    display: none;
    overflow-y: auto;
  }
  #detailOverlay.show { display: block; }

  .detail-close {
    position: fixed;
    top: 20px;
    right: 32px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-raised);
    border: 1px solid rgba(232,178,77,0.3);
    color: var(--cream);
    font-size: 18px;
    cursor: pointer;
    z-index: 101;
  }
  .detail-close:hover { border-color: var(--gold); color: var(--gold); }

  .detail-hero {
    position: relative;
    min-height: 380px;
    display: flex;
    align-items: flex-end;
    padding: 50px 40px;
    background-size: cover;
    background-position: center 20%;
  }
  .detail-hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--bg) 5%, rgba(11,11,15,0.55) 60%, rgba(11,11,15,0.25));
  }

  .detail-hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 28px;
    align-items: flex-end;
    max-width: 900px;
  }
  .detail-poster {
    width: 160px;
    height: 236px;
    border-radius: var(--radius);
    object-fit: cover;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(232,178,77,0.25);
    flex-shrink: 0;
  }
  .detail-title { font-size: 44px; color: var(--cream); margin: 0 0 8px; }
  .detail-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .genre-pill {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(232,178,77,0.12);
    color: var(--gold);
    border: 1px solid rgba(232,178,77,0.25);
  }
  .detail-overview {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 640px;
  }

  .detail-body { padding: 10px 0 70px; }

  .placeholder-state {
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
  }
  .placeholder-state .display { font-size: 32px; color: var(--gold-dim); margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo display">CINE<span>MATCH</span></div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search a movie you love…" autocomplete="off">
    <div id="suggestions"></div>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-category="popular">Popular</button>
  <button class="tab" data-category="trending">Trending Today</button>
  <button class="tab" data-category="top_rated">Top Rated</button>
  <button class="tab" data-category="upcoming">Upcoming</button>
  <button class="tab" data-category="now_playing">Now Playing</button>
</div>

<main id="homeRows"></main>

<!-- Detail overlay -->
<div id="detailOverlay">
  <button class="detail-close" onclick="closeDetail()">&times;</button>
  <div id="detailContent"></div>
</div>

<script>
  
  const API_BASE = "";

  const homeRowsEl = document.getElementById("homeRows");
  const tabsEl = document.getElementById("tabs");
  const searchInput = document.getElementById("searchInput");
  const suggestionsEl = document.getElementById("suggestions");
  const overlay = document.getElementById("detailOverlay");
  const detailContent = document.getElementById("detailContent");

  const CATEGORY_LABELS = {
    popular: "Popular Right Now",
    trending: "Trending Today",
    top_rated: "Top Rated",
    upcoming: "Coming Soon",
    now_playing: "Now Playing"
  };

  // ---------- Home feed ----------
  async function loadCategory(category) {
    homeRowsEl.innerHTML = `<div class="loading-row">Loading ${CATEGORY_LABELS[category] || category}…</div>`;
    try {
      const res = await fetch(`${API_BASE}/home?category=${category}&limit=24`);
      if (!res.ok) throw new Error(`Server responded ${res.status}`);
      const movies = await res.json();
      renderRow(CATEGORY_LABELS[category] || category, movies, "Live from TMDB");
    } catch (err) {
      homeRowsEl.innerHTML = `<div class="empty-row">Couldn't load movies. Is the FastAPI server running at ${API_BASE}? (${err.message})</div>`;
    }
  }

  function renderRow(title, movies, eyebrow) {
    if (!movies || movies.length === 0) {
      homeRowsEl.innerHTML = `<div class="empty-row">No movies found for this category.</div>`;
      return;
    }
    const cardsHtml = movies.map(m => posterCardHtml({
      id: m.tmdb_id,
      title: m.title,
      poster: m.poster_url,
      sub: m.release_date ? m.release_date.slice(0, 4) : "",
      score: m.vote_average ? m.vote_average.toFixed(1) : null
    })).join("");

    homeRowsEl.innerHTML = `
      <div class="row-section">
        <div class="row-title"><span class="eyebrow">${eyebrow || ""}</span> ${title}</div>
        <div class="poster-row">${cardsHtml}</div>
      </div>
    `;
    attachCardHandlers();
  }

  function posterCardHtml({ id, title, poster, sub, score }) {
    const img = poster
      ? `<img src="${poster}" alt="${escapeHtml(title)} poster" loading="lazy">`
      : `<div class="no-img">${escapeHtml(title)}</div>`;
    return `
      <div class="poster-card" data-title="${escapeHtml(title)}" data-id="${id}">
        <div class="poster-img-wrap">${img}</div>
        <div class="poster-meta">
          <div class="p-title">${escapeHtml(title)}</div>
          <div class="p-sub">${sub || ""} ${score ? `<span class="score-badge">★ ${score}</span>` : ""}</div>
        </div>
      </div>
    `;
  }

  function attachCardHandlers() {
    document.querySelectorAll(".poster-card").forEach(card => {
      card.onclick = () => openMovie(card.dataset.title);
    });
  }

  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"']/g, s => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[s]));
  }

  // ---------- Tabs ----------
  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    tabsEl.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    loadCategory(btn.dataset.category);
  });

  // ---------- Search suggestions (debounced) ----------
  let searchTimer = null;
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim();
    clearTimeout(searchTimer);
    if (q.length < 2) {
      suggestionsEl.classList.remove("show");
      return;
    }
    searchTimer = setTimeout(() => fetchSuggestions(q), 300);
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) suggestionsEl.classList.remove("show");
  });

  async function fetchSuggestions(query) {
    try {
      const res = await fetch(`${API_BASE}/tmdb/search?query=${encodeURIComponent(query)}&page=1`);
      if (!res.ok) return;
      const data = await res.json();
      const results = (data.results || []).slice(0, 8);
      if (results.length === 0) {
        suggestionsEl.innerHTML = `<div class="suggestion-item" style="cursor:default"><span class="s-title">No matches found</span></div>`;
      } else {
        suggestionsEl.innerHTML = results.map(m => `
          <div class="suggestion-item" data-title="${escapeHtml(m.title)}">
            <img src="${m.poster_path ? "https://image.tmdb.org/t/p/w500" + m.poster_path : ""}" onerror="this.style.display='none'">
            <span class="s-title">${escapeHtml(m.title)}</span>
            <span class="s-year">${m.release_date ? m.release_date.slice(0,4) : ""}</span>
          </div>
        `).join("");
      }
      suggestionsEl.classList.add("show");

      suggestionsEl.querySelectorAll(".suggestion-item[data-title]").forEach(item => {
        item.onclick = () => {
          suggestionsEl.classList.remove("show");
          searchInput.value = item.dataset.title;
          openMovie(item.dataset.title);
        };
      });
    } catch (err) {
      // fail quietly, suggestions are non-critical
    }
  }

  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && searchInput.value.trim()) {
      suggestionsEl.classList.remove("show");
      openMovie(searchInput.value.trim());
    }
  });

  // ---------- Movie detail + recommendations ----------
  async function openMovie(title) {
    overlay.classList.add("show");
    document.body.style.overflow = "hidden";
    detailContent.innerHTML = `<div class="placeholder-state"><div class="display">Loading…</div>Fetching details and recommendations</div>`;

    try {
      const res = await fetch(`${API_BASE}/movie/search?query=${encodeURIComponent(title)}&tfidf_top_n=12&genre_limit=12`);
      if (!res.ok) throw new Error(`Server responded ${res.status}`);
      const data = await res.json();
      renderDetail(data);
    } catch (err) {
      detailContent.innerHTML = `<div class="placeholder-state"><div class="display">Couldn't load this one</div>${err.message}</div>`;
    }
  }

  function renderDetail(data) {
    const d = data.movie_details;
    const genresHtml = (d.genres || []).map(g => `<span class="genre-pill">${escapeHtml(g.name)}</span>`).join("");

    const tfidfCards = (data.tfidf_recommendations || []).map(item => posterCardHtml({
      id: item.tmdb ? item.tmdb.tmdb_id : "",
      title: item.title,
      poster: item.tmdb ? item.tmdb.poster_url : null,
      sub: item.tmdb && item.tmdb.release_date ? item.tmdb.release_date.slice(0,4) : "",
      score: null
    })).join("");

    const genreCards = (data.genre_recommendations || []).map(m => posterCardHtml({
      id: m.tmdb_id,
      title: m.title,
      poster: m.poster_url,
      sub: m.release_date ? m.release_date.slice(0,4) : "",
      score: m.vote_average ? m.vote_average.toFixed(1) : null
    })).join("");

    detailContent.innerHTML = `
      <div class="detail-hero" style="background-image: url('${d.backdrop_url || d.poster_url || ""}')">
        <div class="detail-hero-content">
          ${d.poster_url ? `<img class="detail-poster" src="${d.poster_url}" alt="${escapeHtml(d.title)}">` : ""}
          <div>
            <h1 class="detail-title display">${escapeHtml(d.title)}</h1>
            <div class="detail-meta">
              ${d.release_date ? `<span class="genre-pill">${d.release_date.slice(0,4)}</span>` : ""}
              ${genresHtml}
            </div>
            <p class="detail-overview">${escapeHtml(d.overview || "No overview available.")}</p>
          </div>
        </div>
      </div>
      <div class="detail-body">
        <div class="row-section">
          <div class="row-title"><span class="eyebrow">Content-based · TF-IDF</span> Because you liked this</div>
          <div class="poster-row">${tfidfCards || "<div class='empty-row'>No content-based matches in the local dataset yet.</div>"}</div>
        </div>
        <div class="row-section">
          <div class="row-title"><span class="eyebrow">TMDB · Same genre</span> More like this</div>
          <div class="poster-row">${genreCards || "<div class='empty-row'>No genre matches found.</div>"}</div>
        </div>
      </div>
    `;
    attachCardHandlers();
  }

  function closeDetail() {
    overlay.classList.remove("show");
    document.body.style.overflow = "";
  }

  // ---------- Init ----------
  loadCategory("popular");
</script>

</body>
</html>
